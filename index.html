<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Grow Up - Ứng dụng lập kế hoạch tập luyện và dinh dưỡng hàng ngày. Theo dõi tiến độ, tạo workout plan AI-powered." />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Grow Up | Daily Planner</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Icons -->
  <link rel="icon" type="image/webp" href="/icons/icon-96.webp" />
  <link rel="apple-touch-icon" href="/icons/icon-192.webp" />

  <!-- DNS Prefetch & Preconnect for faster external resources -->
  <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />
  <link rel="preconnect" href="https://generativelanguage.googleapis.com" crossorigin />
</head>

<body>
  <div id="root">
    <div
      class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-[#050505] transition-all duration-500">
      <div class="flex flex-col items-center">
        <div class="relative mb-8 group">
          <div
            class="absolute inset-0 bg-cyan-500/20 blur-[40px] rounded-full scale-0 group-hover:scale-150 transition-transform duration-1000">
          </div>
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-brain w-16 h-16 text-cyan-500 relative z-10 drop-shadow-[0_0_15px_rgba(6,182,212,0.5)] animate-pulse-slow">
            <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z" />
            <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z" />
            <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4" />
            <path d="M17.599 6.5a3 3 0 0 0 .399-1.375" />
            <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5" />
            <path d="M3.477 10.896a4 4 0 0 1 .585-.396" />
            <path d="M19.938 10.5a4 4 0 0 1 .585.396" />
            <path d="M6 18a4 4 0 0 1-1.97-1.375" />
            <path d="M19.97 16.625A4 4 0 0 1 18 18" />
          </svg>
        </div>
        <h2 class="text-3xl tracking-[0.3em] font-light text-white mb-2 uppercase">
          Grow<span class="font-bold text-cyan-500">AI</span>
        </h2>
        <div class="h-6 overflow-hidden mb-8">
          <p class="text-gray-500 text-sm font-light tracking-wide animate-fade-in-up">
            Đang khởi tạo ứng dụng...
          </p>
        </div>
        <div class="w-32 h-[1px] bg-gray-800 rounded-full overflow-hidden">
          <div class="h-full bg-cyan-500 shadow-[0_0_10px_cyan] animate-progress-loading"></div>
        </div>
      </div>
      <style>
        @keyframes progress-loading {
          0% {
            transform: translateX(-100%);
            width: 20%;
          }

          50% {
            width: 60%;
          }

          100% {
            transform: translateX(100%);
            width: 20%;
          }
        }

        @keyframes fade-in-up {
          0% {
            opacity: 0;
            transform: translateY(5px);
          }

          100% {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes pulse-slow {

          0%,
          100% {
            opacity: 1;
            transform: scale(1);
          }

          50% {
            opacity: 0.8;
            transform: scale(0.95);
          }
        }

        .animate-progress-loading {
          animation: progress-loading 2s infinite ease-in-out;
        }

        .animate-fade-in-up {
          animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-pulse-slow {
          animation: pulse-slow 3s infinite ease-in-out;
        }

        /* Tailwind utility classes replacements for inline use */
        .fixed {
          position: fixed;
        }

        .inset-0 {
          top: 0px;
          right: 0px;
          bottom: 0px;
          left: 0px;
        }

        .z-\[100\] {
          z-index: 100;
        }

        .flex {
          display: flex;
        }

        .flex-col {
          flex-direction: column;
        }

        .items-center {
          align-items: center;
        }

        .justify-center {
          justify-content: center;
        }

        .bg-\[\#050505\] {
          background-color: #050505;
        }

        .transition-all {
          transition-property: all;
          transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
          transition-duration: 150ms;
        }

        .duration-500 {
          transition-duration: 500ms;
        }

        .relative {
          position: relative;
        }

        .mb-8 {
          margin-bottom: 2rem;
        }

        .group:hover .group-hover\:scale-150 {
          transform: scale(1.5);
        }

        .absolute {
          position: absolute;
        }

        .bg-cyan-500\/20 {
          background-color: rgb(6 182 212 / 0.2);
        }

        .blur-\[40px\] {
          filter: blur(40px);
        }

        .rounded-full {
          border-radius: 9999px;
        }

        .scale-0 {
          transform: scale(0);
        }

        .transition-transform {
          transition-property: transform;
          transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
          transition-duration: 150ms;
        }

        .duration-1000 {
          transition-duration: 1000ms;
        }

        .w-16 {
          width: 4rem;
        }

        .h-16 {
          height: 4rem;
        }

        .text-cyan-500 {
          color: rgb(6 182 212);
        }

        .z-10 {
          z-index: 10;
        }

        .drop-shadow-\[0_0_15px_rgba\(6\,182\,212\,0\.5\)\] {
          filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.5));
        }

        .text-3xl {
          font-size: 1.875rem;
          line-height: 2.25rem;
        }

        .tracking-\[0\.3em\] {
          letter-spacing: 0.3em;
        }

        .font-light {
          font-weight: 300;
        }

        .text-white {
          color: rgb(255 255 255);
        }

        .mb-2 {
          margin-bottom: 0.5rem;
        }

        .uppercase {
          text-transform: uppercase;
        }

        .font-bold {
          font-weight: 700;
        }

        .h-6 {
          height: 1.5rem;
        }

        .overflow-hidden {
          overflow: hidden;
        }

        .text-gray-500 {
          color: rgb(107 114 128);
        }

        .text-sm {
          font-size: 0.875rem;
          line-height: 1.25rem;
        }

        .tracking-wide {
          letter-spacing: 0.025em;
        }

        .w-32 {
          width: 8rem;
        }

        .h-\[1px\] {
          height: 1px;
        }

        .bg-gray-800 {
          background-color: rgb(31 41 55);
        }

        .h-full {
          height: 100%;
        }

        .shadow-\[0_0_10px_cyan\] {
          box-shadow: 0 0 10px cyan;
        }
      </style>
    </div>
  </div>
  <script type="module" src="./index.tsx"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>

</html>
