<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Grow Up - Ứng dụng lập kế hoạch tập luyện và dinh dưỡng hàng ngày. Theo dõi tiến độ, tạo workout plan AI-powered." />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Grow Up | Daily Planner</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Icons -->
  <link rel="icon" type="image/webp" href="/icons/icon-96.webp" />
  <link rel="apple-touch-icon" href="/icons/icon-192.webp" />

  <!-- DNS Prefetch & Preconnect for faster external resources -->
  <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />
  <link rel="preconnect" href="https://generativelanguage.googleapis.com" crossorigin />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>

</html>
